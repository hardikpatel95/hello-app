name: CI/CD — build and deploy to Minikube

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Minikube status
        run: |
          export PATH=$PATH:/usr/local/bin:/snap/bin:/home/hardik/.local/bin
          minikube status || minikube start --driver=docker

      - name: Build Docker image
        run: |
          export PATH=$PATH:/usr/local/bin:/snap/bin:/home/hardik/.local/bin
          unset DOCKER_HOST DOCKER_TLS_VERIFY DOCKER_CERT_PATH
          eval $(minikube docker-env)
          echo "Connected to Docker at: $DOCKER_HOST"
          docker ps | grep minikube
          docker build -t hello-app:latest .

      - name: Deploy to Kubernetes
        run: |
          export PATH=$PATH:/usr/local/bin:/snap/bin:/home/hardik/.local/bin
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deployment/hello-app
          kubectl rollout status deployment/hello-app --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods
          kubectl get services